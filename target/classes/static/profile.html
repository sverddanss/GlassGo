<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassGo — Профиль</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="profile-page" data-component="ProfilePage">
    <aside class="settings-sidebar">
      <div class="settings-header">
        <a href="settings.html" class="btn-icon" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <h2>Профиль</h2>
      </div>

      <div class="settings-profile-card" id="profileSummary" data-component="CurrentUserCard" style="cursor:default;">
        <div class="avatar avatar-lg" id="profileSummaryAvatar" data-bind="currentUser.avatar"></div>
        <div class="settings-profile-info">
          <span class="settings-profile-name" id="profileSummaryName" data-bind="currentUser.fullName"></span>
          <span class="settings-profile-phone" id="profileSummaryEmail" data-bind="currentUser.email"></span>
          <span class="settings-profile-username" id="profileSummaryNickname" data-bind="currentUser.nickname"></span>
        </div>
      </div>

      <nav class="settings-menu" aria-label="Разделы профиля">
        <button class="settings-menu-item active" type="button" data-section="edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>Редактировать</span>
        </button>
      </nav>
    </aside>

    <main class="profile-content">
      <div class="profile-hero">
        <button class="profile-avatar-edit" id="avatarUploadBtn" type="button" data-action="upload-avatar" aria-label="Изменить фото">
          <div class="avatar avatar-xl" id="profileAvatar" data-bind="currentUser.avatar"></div>
          <div class="avatar-overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
        </button>
        <div class="profile-name-display">
          <h2 id="profileDisplayName" data-bind="currentUser.fullName"></h2>
          <p id="profileDisplayStatus" data-bind="currentUser.status"></p>
        </div>
      </div>

      <form class="profile-form-card glass" id="profileForm" data-component="ProfileForm" data-action="update-profile" novalidate>
        <div class="settings-section-title">Личная информация</div>

        <div class="form-group">
          <label class="form-label" for="editFirstName">Имя *</label>
          <input type="text" class="form-input" id="editFirstName" name="firstName" data-bind="currentUser.firstName" required>
          <span class="form-error" data-error-for="firstName"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="editLastName">Фамилия</label>
          <input type="text" class="form-input" id="editLastName" name="lastName" data-bind="currentUser.lastName">
          <span class="form-error" data-error-for="lastName"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="editNickname">Никнейм</label>
          <input type="text" class="form-input" id="editNickname" name="nickname" data-bind="currentUser.nickname" minlength="1" maxlength="20">
          <span class="form-hint">От 1 до 20 символов</span>
          <span class="form-error" data-error-for="nickname"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="editEmail">E-mail</label>
          <input type="email" class="form-input" id="editEmail" name="email" data-bind="currentUser.email" readonly style="opacity:0.6; cursor:not-allowed;">
          <span class="form-hint">Адрес электронной почты используется для входа и не изменяется после регистрации</span>
        </div>

        <div style="display:flex; gap:12px; margin-top:8px;">
          <button class="btn btn-primary" type="submit" style="flex:1;">Сохранить</button>
          <a href="settings.html" class="btn btn-glass" style="flex:1; text-align:center;">Отмена</a>
        </div>
      </form>
    </main>
  </div>

  <script src="js/profile.js" defer></script>
</body>
</html>
