<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassGo — Настройки</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="settings-page" data-component="AccountSettingsPage">
    <aside class="settings-sidebar">
      <div class="settings-header">
        <a href="index.html" class="btn-icon" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <h2>Настройки</h2>
      </div>

      <a href="profile.html" class="settings-profile-card" id="settingsProfileCard" data-component="CurrentUserCard">
        <div class="avatar avatar-lg" id="settingsAvatar" data-bind="currentUser.avatar"></div>
        <div class="settings-profile-info">
          <span class="settings-profile-name" id="settingsFullName" data-bind="currentUser.fullName"></span>
          <span class="settings-profile-phone" id="settingsEmail" data-bind="currentUser.email"></span>
          <span class="settings-profile-username" id="settingsNickname" data-bind="currentUser.nickname"></span>
        </div>
      </a>

      <nav class="settings-menu" aria-label="Настройки аккаунта">
        <button class="settings-menu-item active" type="button" data-section="account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Аккаунт</span>
        </button>
      </nav>
    </aside>

    <main class="settings-content" id="settingsContent">
      <section class="settings-section" id="accountSection" data-component="AccountActions">
        <h2 style="font-size:1.3rem; font-weight:600; margin-bottom:8px;">Аккаунт</h2>

        <div class="settings-option">
          <div class="settings-option-left">
            <span class="settings-option-label">E-mail</span>
            <span class="settings-option-desc" id="accountEmail" data-bind="currentUser.email"></span>
          </div>
        </div>

        <div class="settings-option">
          <div class="settings-option-left">
            <span class="settings-option-label">Статус подтверждения почты</span>
            <span class="settings-option-desc" id="emailVerificationStatus" data-bind="currentUser.emailVerified"></span>
          </div>
          <button class="btn btn-glass btn-sm" id="resendVerificationBtn" type="button" data-action="resend-email-verification">Повторить</button>
        </div>

        <div class="settings-option">
          <div class="settings-option-left">
            <span class="settings-option-label">Редактировать профиль</span>
            <span class="settings-option-desc">Имя, фамилия и никнейм</span>
          </div>
          <a href="profile.html" class="btn btn-glass btn-sm">Открыть</a>
        </div>

        <div style="padding: 12px 0;">
          <button class="btn btn-danger w-full" id="logoutBtn" type="button" data-action="logout" style="border-radius: var(--radius-md);">Выйти из аккаунта</button>
        </div>
      </section>
    </main>
  </div>

  <script src="js/settings.js" defer></script>
</body>
</html>
